app = "civic-issue-backend"
primary_region = "iad"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "civic_data"
  destination = "/data"

[env]
  PORT = "5000"
  DATABASE_FILE = "/data/civic_issue.db"
